services:
  frontend-build:
    image: node:20
    working_dir: /html
    volumes:
      - ./html:/html
      - frontend:/html/dist
    command: sh -c "npm install && npm run build"

  backend:
    build: ./backend
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - photos:/var/photos
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload --log-level debug
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:1.25
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend:/usr/share/nginx/html:ro
      - photos:/var/photos
    depends_on:
      - backend
      - frontend-build
    restart: unless-stopped

  db:
    image: postgres:16
    ports:
      - "5432:5432"
    env_file:
      - ./.env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  photos:
  frontend:
