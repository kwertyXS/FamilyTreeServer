# HTTP → HTTPS redirect
server {
    listen 80;
    server_name physgraph.tech;

    # Для Let's Encrypt ACME-верификации
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name physgraph.tech;

    ssl_certificate     /etc/letsencrypt/live/physgraph.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/physgraph.tech/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index index.html;

    # Раздача фото
    location /photos/ {
        alias /var/photos/;
    }

    # SPA fallback — Vue в history mode
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
