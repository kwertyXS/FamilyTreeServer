# HTTP → HTTPS redirect
server {
    listen 80;
    server_name physgraph.tech;

    client_max_body_size 50m;

    # Для Let's Encrypt ACME-верификации
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name physgraph.tech;

    client_max_body_size 50m;

    ssl_certificate     /ssl_cert/fullchain.pem;
    ssl_certificate_key /ssl_cert/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index index.html;

    # Раздача фото
    location /photos/ {
        alias /var/photos/;
    }

    # Админ API — доступ по паролю
    location /api/admin/ {
        auth_basic "Администрирование";
        auth_basic_user_file /auth/.htpasswd;

        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Остальное API
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Админ страница — доступ по паролю
    location /admin {
        auth_basic "Администрирование";
        auth_basic_user_file /auth/.htpasswd;

        try_files $uri $uri/ /index.html;
    }

    # SPA fallback — Vue в history mode
    location / {
        try_files $uri $uri/ /index.html;
    }
}
