server {
    listen 80;
    server_name _;

    # HTML
    root /usr/share/nginx/html;
    index index.html;

    # Раздача фото
    location /photos/ {
        alias /var/photos/;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    # Проксирование API
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
