server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Раздача фото
    location /photos/ {
        alias /var/photos/;
    }

    # Админ API — доступ по паролю
    location /api/admin/ {
        auth_basic "Администрирование";
        auth_basic_user_file /auth/.htpasswd;

        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Проксирование остального API
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Админ страница — доступ по паролю
    location /admin {
        auth_basic "Администрирование";
        auth_basic_user_file /auth/.htpasswd;

        try_files $uri $uri/ /index.html;
    }

    # SPA fallback — все запросы, не ведущие к реальному файлу, отдают index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
