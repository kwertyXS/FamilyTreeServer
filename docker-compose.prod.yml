services:
  postfix:
    image: boky/postfix
    container_name: postfix
    restart: unless-stopped
    ports:
      - "587:587"
    volumes:
      - /var/lib/familytree/dkim/sikk.su/default.private:/etc/opendkim/keys/sikk.su.private:ro
      - /var/lib/familytree/ssl_cert:/ssl_cert:ro
    environment:
      HOSTNAME: mail.sikk.su
      DOMAIN: sikk.su
      DKIM_SELECTOR: default
      DKIM_DOMAINS: sikk.su
      ENABLE_DKIM: 1
      ENABLE_TLS: 1
      TLS_KEY: /ssl_cert/privkey.pem
      TLS_CERT: /ssl_cert/fullchain.pem
      SMTP_USER: noreply@sikk.su|${RELAY_PASSWORD:?RELAY_PASSWORD not set}
      RELAY_NETWORKS: 172.0.0.0/8
      FORCE_HELO: 1
      LOG_TO_STDOUT: 1
      ALLOWED_SENDER_DOMAINS: sikk.su
    networks:
      - appnet

  frontend-build:
    image: node:20
    restart: "no"
    working_dir: /html
    volumes:
      - ./html:/html
    command: sh -c "npm install && npm run build"

  backend:
    build: ./backend
    env_file:
      - .env
    environment:
      RELAY_HOST: postfix
      RELAY_USERNAME: noreply@sikk.su
      RELAY_PASSWORD: ${RELAY_PASSWORD:?RELAY_PASSWORD not set}
      MAIL_FROM: noreply@sikk.su
    volumes:
      - /var/lib/familytree/auth:/app/auth
      - /var/lib/familytree/photos:/var/photos
    depends_on:
      db:
        condition: service_healthy
      postfix:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - appnet

  nginx:
    image: nginx:1.25
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - /var/lib/familytree/auth:/auth:ro
      - /var/lib/familytree/photos:/var/photos:ro
      - ./html/dist:/usr/share/nginx/html:ro
      - /var/lib/familytree/ssl_cert:/ssl_cert:ro
    depends_on:
      backend:
        condition: service_started
      frontend-build:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - appnet

  db:
    image: postgres:16
    env_file:
      - ./.env
    volumes:
      - /var/lib/familytree/pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - appnet

networks:
  appnet:
    driver: bridge
