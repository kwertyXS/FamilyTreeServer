services:
  frontend-build:
    image: node:20
    working_dir: /html
    volumes:
      - ./html:/html
    command: sh -c "npm install && npm run build"

  backend:
    build: ./backend
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: always
    networks:
      - appnet

  nginx:
    image: nginx:1.25
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./html/dist:/usr/share/nginx/html:ro
      - /var/lib/familytree/certbot/www:/var/www/certbot:ro
      - /var/lib/familytree/certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend-build
    restart: always
    networks:
      - appnet

  db:
    image: postgres:16
    env_file:
      - ./.env
    volumes:
      - /var/lib/familytree/pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - appnet

networks:
  appnet:
    driver: bridge
