name: CI/CD

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- ИСПРАВЛЕНИЕ: Записываем ENV_DATA в файл .env перед сборкой Docker ---
      - name: Create .env file for testing
        env:
          ENV_DATA: ${{ secrets.ENV_DATA }}
        run: |
          printf '%s' "${ENV_DATA}" > .env

      - name: Build image
        run: docker compose -f docker-compose.yml build backend

      # --- run создаёт отдельный контейнер для тестов (uvicorn не запускается) ---
      - name: Run tests
        run: docker compose -f docker-compose.yml run -T --rm backend uv run pytest -v

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.yml down --remove-orphans

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start SSH agent and add key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}

      - name: Add known_hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.KNOWN_HOSTS }}" >> ~/.ssh/known_hosts

      - name: Write .env to server
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          ENV_DATA: ${{ secrets.ENV_DATA }}
        run: |
          ssh ${DEPLOY_USER}@${DEPLOY_HOST} "mkdir -p ${DEPLOY_PATH}"
          printf '%s' "${ENV_DATA}" | ssh ${DEPLOY_USER}@${DEPLOY_HOST} "cat > ${DEPLOY_PATH}/.env && chmod 600 ${DEPLOY_PATH}/.env"

      - name: Deploy to server
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          : "${DEPLOY_USER:?missing DEPLOY_USER}"
          : "${DEPLOY_HOST:?missing DEPLOY_HOST}"
          : "${DEPLOY_PATH:?missing DEPLOY_PATH}"
          ssh ${DEPLOY_USER}@${DEPLOY_HOST} <<EOF
          set -euo pipefail
          cd "${DEPLOY_PATH}"
          git fetch origin master
          git reset --hard origin/master
          docker compose -f docker-compose.prod.yml down
          docker compose -f docker-compose.prod.yml up -d --build
          EOF